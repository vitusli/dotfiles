# Starship prompt config
# Optimized for speed: scan_timeout limits git calls, command_timeout prevents hangs

add_newline = true
scan_timeout = 100       # ms - how long starship scans the directory (default: 30; increased for WSL git)
command_timeout = 500    # ms - how long any single command (incl. git) may take

# Only show the modules we actually want - everything else is disabled by not listing it
format = "$directory$git_branch$git_status$python$nodejs$rust$line_break$character"



[character]
success_symbol = "[❯](#8fbcbb bold)"
error_symbol = "[❯](#bf616a bold)"

[directory]
truncation_length = 2
truncation_symbol = "…/"
repo_root_style = "bold"
repo_root_format = "[$repo_root]($repo_root_style)[$path]($style) "
style = "default"
read_only = " 󰌾"

[git_branch]
format = "[ $branch]($style) "
style = "italic dimmed"
truncation_length = 30
truncation_symbol = "…"

[git_status]
# Only show what's actionable - no noise for clean repos
format = '([$all_status$ahead_behind]($style) )'
style = "default"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
conflicted = "[!${count}](#bf616a)"
untracked = "[?${count}](dimmed)"
modified = "[!${count}](#ebcb8b)"
staged = "[+${count}](#a3be8c)"
deleted = "[-${count}](#bf616a)"
stashed = ""
# Don't scan inside .git dirs, node_modules, etc.
# This is the main performance lever for large repos
ignore_submodules = false

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "cyan"

[package]
disabled = true

[python]
format = "[py $version( \\($virtualenv\\))]($style) "
style = "dimmed"
version_format = "v${major}.${minor}"
symbol = ""

[nodejs]
format = "[node $version]($style) "
style = "dimmed"
version_format = "v${major}.${minor}"
symbol = ""

[rust]
format = "[rs $version]($style) "
style = "dimmed"
version_format = "v${major}.${minor}"
symbol = ""

[git_metrics]
disabled = true
