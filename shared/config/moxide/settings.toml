# Markdown-Oxide settings inspired by your Obsidian preferences

# Daily note format from Obsidian: "YYYY_MM_DD"
dailynote = "%Y_%m_%d"

# Obsidian daily-notes folder is empty (root)
daily_notes_folder = ""

# Obsidian "newFileLocation": "current" (leave blank to use default behavior)
new_file_folder_path = ""

# Fuzzy match file headings in completions
heading_completions = true

# Use first heading as the display title in markdown links
title_headings = true

# Diagnostics and semantic tokens
unresolved_diagnostics = true
semantic_tokens = true

# Code block parsing
tags_in_codeblocks = false
references_in_codeblocks = false

# Link extensions
include_md_extension_md_link = false
include_md_extension_wikilink = false

# Hover and inlay hints
hover = true
inlay_hints = true
block_transclusion = true
block_transclusion_length = "Full"

# Case matching
case_matching = "Smart"

# Link and heading behavior
link_filenames_only = false
heading_slug = false

# Exclude folders by name (from Obsidian ignore filters)
excluded_folders = [""]
