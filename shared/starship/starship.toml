# Starship prompt config
# Optimized for speed: scan_timeout limits git calls, command_timeout prevents hangs

add_newline = true
scan_timeout = 30        # ms - how long starship scans the directory (default: 30)
command_timeout = 500    # ms - how long any single command (incl. git) may take

# Only show the modules we actually want - everything else is disabled by not listing it
format = "$directory$git_branch$git_status$character"



[character]
success_symbol = "[❯](bold cyan)"
error_symbol = "[❯](bold red)"

[directory]
truncation_length = 2
truncation_symbol = "…/"
repo_root_style = "bold cyan"
repo_root_format = "[$repo_root]($repo_root_style)[$path]($style) "
style = "cyan"
read_only = " 󰌾"

[git_branch]
format = "[$branch]($style) "
style = "italic cyan"
truncation_length = 30
truncation_symbol = "…"

[git_status]
# Only show what's actionable - no noise for clean repos
format = '([$all_status$ahead_behind]($style) )'
style = "cyan"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
conflicted = "!${count}"
untracked = "?${count}"
modified = "~${count}"
staged = "+${count}"
deleted = "-${count}"
stashed = ""
# Don't scan inside .git dirs, node_modules, etc.
# This is the main performance lever for large repos
ignore_submodules = false

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "cyan"
