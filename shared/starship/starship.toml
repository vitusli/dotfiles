# Starship prompt config
# Optimized for speed: scan_timeout limits git calls, command_timeout prevents hangs

add_newline = true
scan_timeout = 30        # ms - how long starship scans the directory (default: 30)
command_timeout = 500    # ms - how long any single command (incl. git) may take

# Only show the modules we actually want - everything else is disabled by not listing it
format = "$directory$git_branch$git_status$character"

# Explicitly disable all modules not in format string above
# Otherwise Starship shows them automatically (package, python, node, etc.)
