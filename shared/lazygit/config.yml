{{- /* Resolve OS appearance to choose LazyGit theme: Dark -> Macchiato, Light -> Latte */ -}}
{{- $isDark := true -}}
{{- if eq .chezmoi.os "darwin" -}}
{{- $isDark = contains (trim (output "sh" "-c" "defaults read -g AppleInterfaceStyle 2>/dev/null || echo Light")) "Dark" -}}
{{- else if eq .chezmoi.os "windows" -}}
{{- $isDark = eq (trim (output "powershell.exe" "-NoProfile" "-Command" "(Get-ItemPropertyValue -Path 'HKCU:\\Software\\Microsoft\\Windows\\CurrentVersion\\Themes\\Personalize' -Name AppsUseLightTheme)")) "0" -}}
{{- end -}}

# yaml-language-server: $schema=https://raw.githubusercontent.com/jesseduffield/lazygit/master/schema/config.json

gui:
  nerdFontsVersion: "3"
  showFileIcons: true
  expandFocusedSidePanel: true
  showNumstatInFilesView: true
  showDivergenceFromBaseBranch: arrowAndNumber
  filterMode: fuzzy
  border: rounded

  theme:
{{- if $isDark }}
    activeBorderColor:
      - "#8aadf4"
      - bold
    inactiveBorderColor:
      - "#a5adcb"
    searchingActiveBorderColor:
      - "#eed49f"
      - bold
    optionsTextColor:
      - "#8aadf4"
    selectedLineBgColor:
      - "#363a4f"
    inactiveViewSelectedLineBgColor:
      - "#494d64"
    cherryPickedCommitFgColor:
      - "#8aadf4"
    cherryPickedCommitBgColor:
      - "#494d64"
    markedBaseCommitFgColor:
      - "#8aadf4"
    markedBaseCommitBgColor:
      - "#eed49f"
    unstagedChangesColor:
      - "#ed8796"
    defaultFgColor:
      - "#cad3f5"
{{- else }}
    activeBorderColor:
      - "#1e66f5"
      - bold
    inactiveBorderColor:
      - "#6c6f85"
    searchingActiveBorderColor:
      - "#df8e1d"
      - bold
    optionsTextColor:
      - "#1e66f5"
    selectedLineBgColor:
      - "#ccd0da"
    inactiveViewSelectedLineBgColor:
      - "#bcc0cc"
    cherryPickedCommitFgColor:
      - "#1e66f5"
    cherryPickedCommitBgColor:
      - "#bcc0cc"
    markedBaseCommitFgColor:
      - "#1e66f5"
    markedBaseCommitBgColor:
      - "#df8e1d"
    unstagedChangesColor:
      - "#d20f39"
    defaultFgColor:
      - "#4c4f69"
{{- end }}

  branchColorPatterns:
    "^feature/": "#88c0d0"
    "^fix/": "#bf616a"
    "^hotfix/": "#ebcb8b"
    "^docs/": "#88c0d0"
    "^chore/": "#b48ead"

git:
  log:
    order: topo-order
    showGraph: always
    showWholeGraph: false

  pagers:
    - colorArg: always
      pager: delta {{ if $isDark }}--dark{{ else }}--light{{ end }} --paging=never --line-numbers --no-gitconfig --minus-style=#9b2020 --minus-emph-style=#cc2020 --plus-style=#209620 --plus-emph-style=#20cc20 --zero-style=#808080 --line-numbers-minus-style=#f28779 --line-numbers-plus-style=#d5ff80 --line-numbers-zero-style=#4c566a

os:
  editPreset: "zed"
{{- if ne .chezmoi.os "windows" }}
  shellFunctionsFile: ~/.zsh/functions.zsh
{{- end }}
