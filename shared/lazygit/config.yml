# yaml-language-server: $schema=https://raw.githubusercontent.com/jesseduffield/lazygit/master/schema/config.json

gui:
  nerdFontsVersion: "3"
  showFileIcons: true
  expandFocusedSidePanel: true
  showNumstatInFilesView: true
  showDivergenceFromBaseBranch: arrowAndNumber
  filterMode: fuzzy
  border: rounded

  theme:
    selectedLineBgColor:
      - reverse
    activeBorderColor:
      - cyan
      - bold

  branchColorPatterns:
    "^feature/": "#88c0d0"
    "^fix/": "#bf616a"
    "^hotfix/": "#ebcb8b"
    "^docs/": "#a3be8c"
    "^chore/": "#b48ead"

git:
  log:
    order: topo-order
    showGraph: always
    showWholeGraph: false

  pagers:
    - colorArg: never
      pager: delta --paging=never --line-numbers --syntax-theme=Nord --minus-style=#2d1515 --minus-emph-style=#4a2020 --plus-style=#152d15 --plus-emph-style=#1e3d1e --zero-style=syntax --line-numbers-minus-style=#bf616a --line-numbers-plus-style=#a3be8c --line-numbers-zero-style=#4c566a

os:
  editPreset: "zed"
  shellFunctionsFile: ~/.zsh/functions.zsh
